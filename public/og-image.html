<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>FX Clearing Hub OG Image</title>
    <style>
        body {
            margin: 0;
            padding: 40px;
            background: linear-gradient(135deg, #1e40af 0%, #7c3aed 100%);
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            height: calc(100vh - 80px);
        }
        .logo {
            font-size: 48px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #ffffff;
        }
        .tagline {
            font-size: 24px;
            margin-bottom: 10px;
            opacity: 0.9;
        }
        .subtitle {
            font-size: 18px;
            opacity: 0.8;
        }
        .badge {
            background: rgba(255,255,255,0.2);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            display: inline-block;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="logo">FX Clearing Hub</div>
    <div class="tagline">Stable Payment Infrastructure</div>
    <div class="subtitle">for High-Risk Merchants</div>
    <div class="badge">Secure • Compliant • Global</div>
</body>
</html>
